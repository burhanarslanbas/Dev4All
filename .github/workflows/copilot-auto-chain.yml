name: Copilot Auto-Chain

# PR merge olduğunda kapatılan issue'nun sıradaki issue'sunu Copilot'a atar.
# Bu sayede issue'lar zincirleme (sequential) olarak çözülür.
on:
  pull_request:
    types: [closed]

jobs:
  # ── Adım 1: Auto-merge sonrası zincir tetikleme ──
  chain-next-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find closed issue and assign next to Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          
          # PR body'den "Closes #XX" veya "Fixes #XX" ile bağlı issue numarasını çek
          CLOSED_ISSUE="$(printf '%s' "$PR_BODY" | grep -oE '(Closes|Fixes|Resolves)[[:space:]]*#[0-9]+' | head -1 | grep -oE '[0-9]+$' || true)"

          if [ -z "${CLOSED_ISSUE:-}" ]; then
            echo "⏭️ No linked issue found in PR body, skipping chain."
            exit 0
          fi

          echo "🔗 Closed issue: #$CLOSED_ISSUE"

          # ── Issue Zincir Haritası ──
          # Frontend Sprint 1 (Scaffold & Auth)
          # #72 → #73 → #74 → #75 → #76 → #77
          # Frontend Sprint 2 (Project Pages)
          # #78 → #79 → #80 → #81 → #82 → #83
          # Frontend Sprint 3 (Bid Pages)
          # #84 → #85 → #86 → #87 → #88
          # Frontend Sprint 4 (Contract Pages)
          # #89 → #90 → #91 → #92 → #93
          # Frontend Sprint 5 (GitHub & Dashboard)
          # #94 → #95 → #96 → #97
          # Frontend Sprint 6 (UX Polish)
          # #98 → #99 → #100 → #101 → #102
          # Frontend Sprint 7 (Testing & Docs)
          # #103 → #104 → #105
          #
          # Mobile Sprint 1 (Foundation)
          # #9 → #10 → #11 → #12 → #13
          # Mobile Sprint 2 (Auth)
          # #14 → #15 → #16 → #17 → #18
          # Mobile Auth Extras (Backend S0 gerektirir)
          # #123 → #121 → #120 → #122
          # Mobile Sprint 3 (Navigation)
          # #19 → #20 → #21 → #22 → #23 → #24

          NEXT_ISSUE=""
          case $CLOSED_ISSUE in
            # ── Frontend Sprint 1 ──
            72) NEXT_ISSUE=73 ;;
            73) NEXT_ISSUE=74 ;;
            74) NEXT_ISSUE=75 ;;
            75) NEXT_ISSUE=76 ;;
            76) NEXT_ISSUE=77 ;;
            # ── Frontend Sprint 2 ──
            77) NEXT_ISSUE=78 ;;
            78) NEXT_ISSUE=79 ;;
            79) NEXT_ISSUE=80 ;;
            80) NEXT_ISSUE=81 ;;
            81) NEXT_ISSUE=82 ;;
            82) NEXT_ISSUE=83 ;;
            # ── Frontend Sprint 3 ──
            83) NEXT_ISSUE=84 ;;
            84) NEXT_ISSUE=85 ;;
            85) NEXT_ISSUE=86 ;;
            86) NEXT_ISSUE=87 ;;
            87) NEXT_ISSUE=88 ;;
            # ── Frontend Sprint 4 ──
            88) NEXT_ISSUE=89 ;;
            89) NEXT_ISSUE=90 ;;
            90) NEXT_ISSUE=91 ;;
            91) NEXT_ISSUE=92 ;;
            92) NEXT_ISSUE=93 ;;
            # ── Frontend Sprint 5 ──
            93) NEXT_ISSUE=94 ;;
            94) NEXT_ISSUE=95 ;;
            95) NEXT_ISSUE=96 ;;
            96) NEXT_ISSUE=97 ;;
            # ── Frontend Sprint 6 ──
            97) NEXT_ISSUE=98 ;;
            98) NEXT_ISSUE=99 ;;
            99) NEXT_ISSUE=100 ;;
            100) NEXT_ISSUE=101 ;;
            101) NEXT_ISSUE=102 ;;
            # ── Frontend Sprint 7 ──
            102) NEXT_ISSUE=103 ;;
            103) NEXT_ISSUE=104 ;;
            104) NEXT_ISSUE=105 ;;
            # ── Mobile Sprint 1 (Foundation) ──
            9) NEXT_ISSUE=10 ;;
            10) NEXT_ISSUE=11 ;;
            11) NEXT_ISSUE=12 ;;
            12) NEXT_ISSUE=13 ;;
            # ── Mobile Sprint 2 (Auth) ──
            13) NEXT_ISSUE=14 ;;
            14) NEXT_ISSUE=15 ;;
            15) NEXT_ISSUE=16 ;;
            16) NEXT_ISSUE=17 ;;
            17) NEXT_ISSUE=18 ;;
            # ── Mobile Auth Extras ──
            18) NEXT_ISSUE=123 ;;
            123) NEXT_ISSUE=121 ;;
            121) NEXT_ISSUE=120 ;;
            120) NEXT_ISSUE=122 ;;
            # ── Mobile Sprint 3 (Navigation) ──
            122) NEXT_ISSUE=19 ;;
            19) NEXT_ISSUE=20 ;;
            20) NEXT_ISSUE=21 ;;
            21) NEXT_ISSUE=22 ;;
            22) NEXT_ISSUE=23 ;;
            23) NEXT_ISSUE=24 ;;
            *) echo "🏁 No next issue mapped for #$CLOSED_ISSUE (end of chain or unmapped)"; exit 0 ;;
          esac

          echo "➡️ Next issue: #$NEXT_ISSUE"

          # Sonraki issue'yu yorumla Copilot'a tetikleme
          COMMENT_BODY=$'@copilot Lütfen bu issue\'yu çözmeye başla.\n- **Hedef Branch:** `develop`\n- **Model:** `GPT-5.3-Codex` (veya mümkün olan en iyi model)\n- Gerekli task detayları issue gövdesinde (body) ve `docs/AGENTS.md` dosyasında mevcuttur.'
          gh issue comment "$NEXT_ISSUE" -b "$COMMENT_BODY" || echo "⚠️ Failed to add trigger comment to Issue #$NEXT_ISSUE."

          echo "✅ Trigger comment left on Issue #$NEXT_ISSUE for Copilot"
