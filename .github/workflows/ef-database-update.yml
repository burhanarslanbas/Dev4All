# Manual-only: apply EF Core migrations to the database configured in the target GitHub Environment.
# Configure DATABASE__CONNECTIONSTRING in the environment secrets and protect the environment with reviewers.

name: EF database update

on:
  workflow_dispatch:
    inputs:
      environment:
        description: GitHub Environment name (must define DATABASE__CONNECTIONSTRING secret)
        required: true
        type: string
        default: production

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dotnet tools (dotnet-ef)
        run: dotnet tool restore

      - name: Apply EF migrations
        env:
          DATABASE__CONNECTIONSTRING: ${{ secrets.DATABASE__CONNECTIONSTRING }}
        run: |
          dotnet ef database update \
            --project backend/src/Infrastructure/Dev4All.Persistence/Dev4All.Persistence.csproj \
            --startup-project backend/src/Presentation/Dev4All.WebAPI/Dev4All.WebAPI.csproj \
            --context Dev4AllDbContext
