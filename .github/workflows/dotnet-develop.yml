name: .NET CI (develop)

on:
  push:
    branches: [develop]
    paths:
      - "backend/**"
      - ".github/workflows/dotnet-develop.yml"
  pull_request:
    branches: [develop]
    paths:
      - "backend/**"
      - ".github/workflows/dotnet-develop.yml"

jobs:
  build-and-test-backend:
    name: Build & Test Backend (develop)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore Dev4All.slnx

      - name: Build
        run: dotnet build Dev4All.slnx --no-restore --configuration Release

      - name: Test
        env:
          # GitHub Secrets'dan alınan değerleri .NET konfigürasyon yapısına (Json/Env formatı) mapliyoruz
          # Hiyerarşi için "__" kullanılıyor (Örn: "Jwt:Key" -> "Jwt__Key")
          Jwt__Key: ${{ secrets.JWT_KEY }}
          Jwt__Issuer: ${{ secrets.JWT_ISSUER }}
          Jwt__Audience: ${{ secrets.JWT_AUDIENCE }}
          ConnectionStrings__DefaultConnection: ${{ secrets.DB_CONNECTION }}
        run: dotnet test Dev4All.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
